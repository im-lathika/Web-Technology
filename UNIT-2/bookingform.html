<!DOCTYPE html>
<html>
<head>
<title>Book Your Trip | Prime Journey</title>

<style>
body{
    margin:0;
    font-family:"Times New Roman", serif;
    background:linear-gradient(to right,#fff0f5,#ffe4ec);
}

header{
    background:#fff;
    padding:20px;
    text-align:center;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

header h1{
    margin:0;
    font-size:32px;
}

nav{
    margin-top:10px;
}

nav a{
    text-decoration:underline;
    font-size:18px;
    margin:0 5px;
    color:black;
    transition:0.3s;
}

nav a:hover{
    transform:scale(1.1);
}

.form-container{
    width:450px;
    margin:50px auto;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

.form-container h2{
    text-align:center;
    margin-bottom:20px;
    color:#d63384;
}

label{
    font-weight:bold;
    font-size:14px;
}

input,select,textarea{
    width:100%;
    padding:8px;
    margin:5px 0 15px;
    border-radius:8px;
    border:1px solid #ccc;
}

textarea{resize:none;}

.payment-title{
    text-align:center;
    margin:20px 0 10px;
    font-weight:bold;
}

button{
    width:100%;
    padding:6px 14px;
    font-weight:bold;
    border:1px solid black;
    border-radius:5px;
    background:white;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:black;
    color:white;
    transform:scale(1.1);
}

footer{
    text-align:center;
    padding:20px;
    margin-top:40px;
}
</style>
</head>

<body>

<header>
<h1>Prime Journey</h1>
<nav>
<a href="home2.html">Home🏠</a> |
<a href="destinationspage.html">Destination📍</a> |
<a href="packages.html">Package💰</a> |
<a href="bookingform.html">Booking details✈️</a> |
<a href="reviews.html">Reviews🌟</a> |
<a href="aboutus2.html">About Us💼</a>
</nav>
</header>

<div class="form-container">
<h2>Book Your Trip ✈️</h2>

<form action="submitbooking.html" method="post">

<label>Full Name</label>
<input type="text" required>

<label>Email</label>
<input type="email" required>

<label>Phone Number</label>
<input type="tel" required>

<label>Select Package</label>
<select required>
<option value="">--Choose Package--</option>
<option>Romantic Paris</option>
<option>Sunny Bali</option>
<option>Swiss Adventure</option>
<option>Taj Mahal Explorer</option>
</select>

<label>Number of Travelers</label>
<input type="number" min="1" value="1" required>

<label>Start Date</label>
<input type="date" required>

<label>End Date</label>
<input type="date" required>

<label>Special Requests</label>
<textarea rows="3"></textarea>

<div class="payment-title">💳 Payment Details</div>

<label>Card Holder Name</label>
<input type="text" required>

<label>Card Number</label>
<input type="text" maxlength="16" required>

<label>Expiry Date (MM/YY)</label>
<input type="text" placeholder="MM/YY" maxlength="5" required>

<label>CVV</label>
<input type="password" maxlength="3" required>

<button type="submit">Confirm Booking ✈️</button>
</form>
</div>
<footer>
© 2026 Prime Journey. All Rights Reserved.
</footer>

</body>
</html>
